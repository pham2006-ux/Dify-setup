app:
  description: '顧客からの問い合わせ内容を自動分類し、緊急度を判定、該当部署のSlackチャンネルへ自動通知するボット。'
  icon: "\U0001F4E8"
  icon_background: '#E3F2FD'
  mode: advanced-chat
  name: "問い合わせ分類・Slack通知ボット"
  use_icon_as_answer_icon: false
