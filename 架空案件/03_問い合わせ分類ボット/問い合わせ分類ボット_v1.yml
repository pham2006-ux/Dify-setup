    name: SLACK_WEBHOOK_GENERAL
    selector:
    - env
    - SLACK_WEBHOOK_GENERAL
    value: ''
    value_type: secret
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      allowed_file_upload_methods:
      - local_file
      - remote_url
      enabled: false
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 20
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: "📨 顧客問い合わせ分類・通知ボットです。\n\nお客様からの問い合わせ内容を貼り付けてください。\n自動で以下を実行します：\n\n1️⃣ カテゴリ分類（技術/請求/契約/一般）\n2️⃣ 緊急度判定（🔴緊急 / 🟡通常）\n3️⃣ 担当チャンネルへSlack自動通知\n\n※ 環境変数にSlack Webhook URLの設定が必要です。"
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - "システムにログインできなくなりました。至急対応をお願いします。"
    - "先月の請求書の金額に誤りがあるようです。確認をお願いします。"
    - "契約の更新手続きについて教えてください。"
    suggested_questions_after_answer:
      enabled: true
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
