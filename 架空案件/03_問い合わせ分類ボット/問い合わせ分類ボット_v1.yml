    - data:
        context:
          enabled: false
        memory:
          query_prompt_template: '{{#sys.query#}}


            {{#sys.files#}}'
          role_prefix:
            assistant: ''
            user: ''
          window:
            enabled: true
            size: 10
        model:
          completion_params:
            temperature: 0.2
          mode: chat
          name: gemini-2.5-flash
          provider: langgenius/gemini/google
        prompt_template:
        - id: prompt-classify-system
          role: system
          text: "あなたは顧客問い合わせの分類専門AIです。\n\n問い合わせ内容を分析し、以下のJSON形式のみを出力してください。\n他のテキストは一切出力しないでください。\n\n{\"category\": \"TECH|BILLING|LEGAL|GENERAL\", \"urgency\": \"URGENT|NORMAL\", \"summary\": \"3行以内の要約\", \"recommended_action\": \"推奨対応アクション\"}\n\n## 分類ルール\n- TECH: システム障害、バグ、操作方法、技術的な質問\n- BILLING: 請求、料金、返金、プラン変更、支払い\n- LEGAL: 契約変更、解約、利用規約、法的な問い合わせ\n- GENERAL: 上記に該当しないもの\n\n## 緊急度判定ルール\n- URGENT: システム停止・データ消失・セキュリティインシデント・サービス利用不可\n- NORMAL: 上記以外"
        selected: false
        title: "分類・判定"
        type: llm
        vision:
          enabled: false
      height: 88
      id: llm
      position:
        x: 380
        y: 282
      positionAbsolute:
        x: 380
        y: 282
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "import json\n\ndef main(llm_output: str, user_query: str,\n         webhook_tech: str, webhook_billing: str,\n         webhook_legal: str, webhook_general: str) -> dict:\n\n    try:\n        data = json.loads(llm_output.strip())\n    except:\n        data = {\"category\": \"GENERAL\", \"urgency\": \"NORMAL\", \"summary\": user_query[:100], \"recommended_action\": \"担当者が確認してください\"}\n\n    category = data.get(\"category\", \"GENERAL\").upper()\n    urgency = data.get(\"urgency\", \"NORMAL\").upper()\n    summary = data.get(\"summary\", \"\")\n    action = data.get(\"recommended_action\", \"\")\n\n    category_names = {\n        \"TECH\": \"技術サポート\",\n        \"BILLING\": \"請求・料金\",\n        \"LEGAL\": \"契約・法務\",\n        \"GENERAL\": \"一般問い合わせ\"\n    }\n\n    webhooks = {\n        \"TECH\": webhook_tech,\n        \"BILLING\": webhook_billing,\n        \"LEGAL\": webhook_legal,\n        \"GENERAL\": webhook_general\n    }\n\n    dept_name = category_names.get(category, \"一般問い合わせ\")\n    webhook_url = webhooks.get(category, webhook_general)\n\n    urgency_icon = \"\\U0001f534 緊急\" if urgency == \"URGENT\" else \"\\U0001f7e1 通常\"\n    mention = \"<!channel> \" if urgency == \"URGENT\" else \"\"\n\n    slack_message = f\"{mention}\\U0001f4e8 問い合わせ通知\\n\\n*カテゴリ:* {dept_name}\\n*緊急度:* {urgency_icon}\\n\\n*要約:*\\n{summary}\\n\\n*推奨アクション:*\\n{action}\\n\\n*原文:*\\n{user_query[:500]}\"\n\n    display_result = f\"## 問い合わせ分類結果\\n\\n| 項目 | 結果 |\\n|------|------|\\n| **カテゴリ** | {dept_name} |\\n| **緊急度** | {urgency_icon} |\\n\\n### 要約\\n{summary}\\n\\n### 推奨アクション\\n{action}\\n\\n---\\n\\U0001f4e4 **{dept_name}チーム**のSlackチャンネルに通知を送信しました。\"\n\n    return {\n        \"webhook_url\": webhook_url,\n        \"slack_message\": slack_message,\n        \"display_result\": display_result,\n        \"urgency\": urgency\n    }\n"
        code_language: python3
        outputs:
          display_result:
            children: null
            type: string
          slack_message:
            children: null
            type: string
          urgency:
            children: null
            type: string
          webhook_url:
            children: null
            type: string
        selected: false
        title: "部署・URL判定"
        type: code
        variables:
        - value_selector:
          - llm
          - text
          variable: llm_output
        - value_selector:
          - sys
          - query
          variable: user_query
        - value_selector:
