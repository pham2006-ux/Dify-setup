  conversation_variables: []
  environment_variables:
  - description: "Google Apps Script WebアプリURL（スプレッドシート記録用）"
    id: env-gas-url
    name: GAS_WEBAPP_URL
    selector:
    - env
    - GAS_WEBAPP_URL
    value: ''
    value_type: secret
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      allowed_file_upload_methods:
      - local_file
      - remote_url
      enabled: false
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 20
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: "こんにちは！採用スクリーニングアシスタントです。👩‍💼\n\n右側の入力パネルから「募集職種」「必須スキル」「候補者情報」を入力して話しかけてください。AIが自動で適性を評価し、スプレッドシートへの記録まで行います。"
    retriever_resource:
      enabled: false
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions: []
    suggested_questions_after_answer:
      enabled: false
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
