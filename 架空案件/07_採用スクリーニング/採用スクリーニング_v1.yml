    nodes:
    - data:
        selected: false
        title: "候補者情報入力"
        type: start
        variables:
        - label: "募集職種"
          max_length: 100
          required: true
          type: text-input
          variable: position
        - label: "必須スキル・要件（箇条書き）"
          max_length: 1000
          required: true
          type: paragraph
          variable: requirements
        - label: "候補者の経歴・スキル"
          max_length: 3000
          required: true
          type: paragraph
          variable: candidate_info
      height: 220
      id: '1740700000001'
      position:
        x: 80
        y: 200
      positionAbsolute:
        x: 80
        y: 200
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        context:
          enabled: false
        memory:
          query_prompt_template: ''
          role_prefix:
            assistant: ''
            user: ''
          window:
            enabled: false
            size: 10
        model:
          completion_params:
            temperature: 0.2
          mode: chat
          name: gemini-2.5-flash
          provider: langgenius/gemini/google
        prompt_template:
        - id: prompt-screening-system
          role: system
          text: "あなたは採用スクリーニングの専門家です。\n\n以下の情報を分析し、JSON形式のみを出力してください。\n\n## 募集職種\n{{#1740700000001.position#}}\n\n## 必須スキル・要件\n{{#1740700000001.requirements#}}\n\n## 候補者情報\n{{#1740700000001.candidate_info#}}\n\n以下のJSON形式で評価してください：\n{\n  \"skill_match_score\": 0-40,\n  \"experience_score\": 0-20,\n  \"industry_score\": 0-20,\n  \"bonus_score\": 0-20,\n  \"skill_details\": \"スキル適合の詳細\",\n  \"experience_details\": \"経験の詳細\",\n  \"strengths\": [\"強み1\", \"強み2\"],\n  \"concerns\": [\"懸念点1\"],\n  \"overall_comment\": \"総合評価コメント\"\n}"
        selected: false
        title: "候補者評価"
        type: llm
        vision:
          enabled: false
      height: 88
      id: llm
      position:
        x: 380
        y: 282
      positionAbsolute:
        x: 380
        y: 282
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        code: "import json\n\ndef main(llm_output: str, position: str) -> dict:\n    try:\n        data = json.loads(llm_output.strip())\n    except:\n        return {\n            \"total_score\": 0,\n            \"recommendation\": \"ERROR\",\n            \"display_result\": \"評価の解析に失敗しました。候補者情報を再入力してください。\",\n            \"gas_payload\": \"{}\"\n        }\n    \n    skill = int(data.get(\"skill_match_score\", 0))\n    exp = int(data.get(\"experience_score\", 0))\n    industry = int(data.get(\"industry_score\", 0))\n    bonus = int(data.get(\"bonus_score\", 0))\n    total = min(skill + exp + industry + bonus, 100)\n    \n    if total >= 80:\n        rec = \"RECOMMENDED\"\n        rec_label = \"\\u2705 面接推奨\"\n    elif total >= 50:\n        rec = \"CONSIDER\"\n        rec_label = \"\\U0001f7e1 要検討\"\n    else:\n        rec = \"NOT_FIT\"\n        rec_label = \"\\u274c 不適合\"\n    \n    strengths = \"\\n\".join([f\"- {s}\" for s in data.get(\"strengths\", [])]) or \"特になし\"\n    concerns = \"\\n\".join([f\"- {c}\" for c in data.get(\"concerns\", [])]) or \"特になし\"\n    \n    display = f\"## \\U0001f464 採用スクリーニング結果\\n\\n\"\n    display += f\"| 項目 | スコア |\\n|------|--------|\\n\"\n    display += f\"| 必須スキル適合度 | {skill}/40 |\\n\"\n    display += f\"| 経験年数 | {exp}/20 |\\n\"\n    display += f\"| 関連業界経験 | {industry}/20 |\\n\"\n    display += f\"| その他加点 | {bonus}/20 |\\n\"\n    display += f\"| **合計** | **{total}/100** |\\n\\n\"\n    display += f\"### 判定: {rec_label}\\n\\n\"\n    display += f\"### 強み\\n{strengths}\\n\\n\"\n    display += f\"### 懸念点\\n{concerns}\\n\\n\"\n    display += f\"### 総合評価\\n{data.get('overall_comment', '')}\\n\\n\"\n    display += f\"---\\n\\U0001f4ca スプレッドシートに結果を記録しました。\"\n    \n    gas_data = {\n        \"position\": position,\n        \"total_score\": total,\n        \"recommendation\": rec,\n        \"skill_score\": skill,\n        \"experience_score\": exp,\n        \"industry_score\": industry,\n        \"bonus_score\": bonus,\n        \"comment\": data.get(\"overall_comment\", \"\")\n    }\n    \n    return {\n        \"total_score\": total,\n        \"recommendation\": rec,\n        \"display_result\": display,\n        \"gas_payload\": json.dumps(gas_data, ensure_ascii=False)\n    }\n"
        code_language: python3
        outputs:
          display_result:
            children: null
            type: string
          gas_payload:
            children: null
            type: string
          recommendation:
            children: null
            type: string
          total_score:
            children: null
            type: number
        selected: false
        title: "スコアリング"
        type: code
        variables:
        - value_selector:
          - llm
