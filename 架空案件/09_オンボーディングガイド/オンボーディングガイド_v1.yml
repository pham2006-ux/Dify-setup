      type: custom
      width: 242
    - data:
        dataset_ids: []
        multiple_retrieval_config:
          reranking_enable: true
          reranking_mode: reranking_model
          reranking_model:
            model: jina-reranker-v3
            provider: langgenius/jina/jina
          top_k: 5
        query_attachment_selector: []
        query_variable_selector:
        - sys
        - query
        retrieval_mode: multiple
        selected: false
        title: "オンボーディング検索"
        type: knowledge-retrieval
      height: 90
      id: '1740900000002'
      position:
        x: 380
        y: 282
      positionAbsolute:
        x: 380
        y: 282
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        context:
          enabled: true
          variable_selector:
          - '1740900000002'
          - result
        memory:
          query_prompt_template: '{{#sys.query#}}


            {{#sys.files#}}'
          role_prefix:
            assistant: ''
            user: ''
          window:
            enabled: true
            size: 10
        model:
          completion_params:
            temperature: 0.3
          mode: chat
          name: gemini-2.5-flash
          provider: langgenius/gemini/google
        prompt_template:
        - id: prompt-onboarding-system
          role: system
          text: "# Role\nあなたはCyberNova株式会社の新人オンボーディングアシスタントです。\n新入社員や中途入社社員の質問に、社内ナレッジベースを参照して丁寧に回答します。\n\n# Objective\n1. 新入社員が迷わないよう、ステップバイステップで具体的に案内する\n2. ナレッジベースの情報を正確に引用して回答する\n3. 情報がない場合は担当部署への連絡先を案内する\n\n# ナレッジベース（コンテキスト）\n{{#context#}}\n\n# Style\n- フレンドリーで親しみやすいトーン（ただし敬語）\n- 手順は番号付きリストで分かりやすく\n- 重要な期限や注意事項は⚠️マークで強調\n- 関連する他の情報も「💡 ヒント」として追加\n\n# Response Structure\n回答は以下の構成で出力：\n\n1. **回答**: 質問への直接的な回答\n2. **手順**: 必要な場合はステップバイステップで\n3. **注意事項**: 期限や制限がある場合\n4. **💡 ヒント**: 関連する便利な情報\n5. **問い合わせ先**: 追加質問がある場合の連絡先\n\n# 回答不可時\nナレッジベースに情報がない場合：\n- 「申し訳ございません、この情報はナレッジベースにございません」と伝える\n- 該当しそうな部署の連絡先を案内する\n  - IT関連 → IT部門（内線: 2000）\n  - 人事関連 → 人事部（内線: 3000）\n  - 総務関連 → 総務部（内線: 4000）\n\n# 制約\n- ナレッジベースの情報のみで回答し、推測しない\n- 個人情報（給与、評価）には回答しない"
        selected: false
        title: "ガイド回答生成"
        type: llm
        vision:
          enabled: false
      height: 88
      id: llm
      position:
        x: 680
        y: 282
      positionAbsolute:
        x: 680
        y: 282
      selected: false
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    - data:
        answer: '{{#llm.text#}}'
        selected: false
        title: "回答"
        type: answer
        variables: []
      height: 102
      id: answer
      position:
        x: 980
        y: 282
      positionAbsolute:
        x: 980
        y: 282
      selected: true
      sourcePosition: right
      targetPosition: left
      type: custom
      width: 242
    viewport:
      x: 151.5
      y: 63.5
      zoom: 1
  rag_pipeline_variables: []
