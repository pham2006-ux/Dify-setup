app:
  description: '新入社員の入社手続き・IT環境設定・社内制度について、ナレッジベースを参照してステップバイステップでガイドするボット。'
  icon: "\U0001F393"
  icon_background: '#E8F5E9'
  mode: advanced-chat
  name: "新人オンボーディングガイド"
  use_icon_as_answer_icon: false
dependencies:
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/gemini:0.7.4@5faf411e694e0da130a337347a625a3812b1b7502a0183382d66d92c841bf05a
    version: null
- current_identifier: null
  type: marketplace
  value:
    marketplace_plugin_unique_identifier: langgenius/jina:0.0.16@8466270487ebad423f555bee45e7146cef8f5ab9fb9d1869f224931f5f3ae4f9
    version: null
kind: app
version: 0.5.0
workflow:
  conversation_variables: []
  environment_variables: []
  features:
    file_upload:
      allowed_file_extensions:
      - .JPG
      - .JPEG
      - .PNG
      - .GIF
      - .WEBP
      - .SVG
      allowed_file_types:
      - image
      allowed_file_upload_methods:
      - local_file
      - remote_url
      enabled: false
      fileUploadConfig:
        attachment_image_file_size_limit: 2
        audio_file_size_limit: 50
        batch_count_limit: 5
        file_size_limit: 15
        file_upload_limit: 20
        image_file_batch_limit: 10
        image_file_size_limit: 10
        single_chunk_attachment_limit: 10
        video_file_size_limit: 100
        workflow_file_upload_limit: 10
      image:
        enabled: false
        number_limits: 3
        transfer_methods:
        - local_file
        - remote_url
      number_limits: 3
    opening_statement: "🎓 新人オンボーディングガイドボットです！\nようこそ、CyberNova株式会社へ！\n\n入社に関する手続きやシステム設定について、何でもお気軽にご質問ください。\n\n📌 対応カテゴリ：\n📋 入社手続き — 必要書類、提出期限、保険手続き\n💻 IT環境設定 — PC、メール、VPN、アカウント\n📊 社内制度 — 勤怠、経費精算、福利厚生\n🏢 オフィス案内 — 入館証、座席、会議室、施設\n📞 連絡先 — 各部署窓口、緊急連絡先\n\n※ ナレッジベースの設定が必要です（インポート後、手動で選択してください）"
    retriever_resource:
      enabled: true
    sensitive_word_avoidance:
      enabled: false
    speech_to_text:
      enabled: false
    suggested_questions:
    - "入社初日に持参するものを教えてください"
    - "社内メールの設定方法を教えてください"
    - "有給休暇はいつから使えますか？"
    suggested_questions_after_answer:
      enabled: true
    text_to_speech:
      enabled: false
      language: ''
      voice: ''
  graph:
    edges:
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: start
        targetType: knowledge-retrieval
      id: 1740900000001-source-1740900000002-target
      source: '1740900000001'
      sourceHandle: source
      target: '1740900000002'
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        isInIteration: false
        isInLoop: false
        sourceType: knowledge-retrieval
        targetType: llm
      id: 1740900000002-source-llm-target
      source: '1740900000002'
      sourceHandle: source
      target: llm
      targetHandle: target
      type: custom
      zIndex: 0
    - data:
        sourceType: llm
        targetType: answer
      id: llm-answer
      source: llm
      sourceHandle: source
      target: answer
      targetHandle: target
      type: custom
    nodes:
